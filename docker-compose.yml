version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: hirematch-backend

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: hirematch-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: unless-stopped